<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>번개마트 — 실시간 운영 대시보드</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1115; color: #e5e7eb; margin: 0; padding: 32px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #9ca3af; font-size: 13px; margin-bottom: 24px; }
  .insight-box {
    background: #1a1d24; border: 1px solid #2a2e37; border-radius: 12px;
    padding: 20px; margin-bottom: 24px; line-height: 1.6; font-size: 15px;
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .card {
    background: #1a1d24; border: 1px solid #2a2e37; border-radius: 12px;
    padding: 16px; transition: border-color 0.3s;
  }
  .card .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .good { background: #22c55e; }
  .info { background: #3b82f6; }
  .warning { background: #f59e0b; }
  .error { background: #ef4444; }
  .card .name { font-weight: 600; font-size: 14px; }
  .card .headline { margin-top: 8px; font-size: 14px; color: #d1d5db; }
  .card .detail { margin-top: 6px; font-size: 12px; color: #9ca3af; }
  .tick { color: #6b7280; font-size: 12px; }
  .pulse { animation: pulse 0.6s ease; }
  @keyframes pulse { 0% { border-color: #60a5fa; } 100% { border-color: #2a2e37; } }
</style>
</head>
<body>
  <h1>⚡ 번개마트 — 성수점 실시간 운영 대시보드</h1>
  <div class="sub" id="meta-sub">연결 중...</div>

  <div class="insight-box" id="insight-text">불러오는 중...</div>

  <div class="grid" id="cards"></div>

  <script>
    const statusColor = { good: 'good', info: 'info', warning: 'warning', error: 'error' };

    async function refresh() {
      try {
        const res = await fetch('/insight');
        const data = await res.json();
        const { unified, raw, tick, generatedAt } = data;

        document.getElementById('meta-sub').textContent =
          `tick #${tick} · ${new Date(generatedAt).toLocaleTimeString('ko-KR')} 기준 · 3초마다 자동 갱신`;

        document.getElementById('insight-text').textContent = unified.insight;

        const cardsEl = document.getElementById('cards');
        cardsEl.innerHTML = '';
        unified.contributing.forEach((d) => {
          const card = document.createElement('div');
          card.className = 'card pulse';

          const header = document.createElement('div');
          const dot = document.createElement('span');
          dot.className = `dot ${statusColor[d.status]}`;
          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = d.domain; // textContent: never parses HTML/JS, safe against XSS
          header.appendChild(dot);
          header.appendChild(name);

          const headline = document.createElement('div');
          headline.className = 'headline';
          headline.textContent = d.headline;

          const detail = document.createElement('div');
          detail.className = 'detail';
          detail.textContent = d.detail;

          card.appendChild(header);
          card.appendChild(headline);
          card.appendChild(detail);
          cardsEl.appendChild(card);
        });
      } catch (e) {
        document.getElementById('meta-sub').textContent = '서버 연결 끊김 — dashboard-server.ts가 실행 중인지 확인하세요.';
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
